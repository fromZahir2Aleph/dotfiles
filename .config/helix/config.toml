theme = "drakula"

[editor]
rulers = [80, 120]
mouse = true
line-number = "relative"

scroll-lines = 1
cursorline = true
auto-save = false
completion-trigger-len = 1
true-color = true
color-modes = true
auto-pairs = true
idle-timeout = 50

[editor.soft-wrap]
enable = true

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.indent-guides]
render = true
character = "|" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1

[editor.file-picker]
hidden = false
parents = false
git-ignore = false

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.statusline]
left = ["mode", "spinner", "total-line-numbers", "file-encoding"]
center = ["file-name", "file-type"]
right = ["selections", "primary-selection-length", "position", "position-percentage", "spacer", "diagnostics", "workspace-diagnostics", "version-control"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[keys.normal]
l = "goto_word"
L = ["select_all", "search"]
"'" = "collapse_selection"
"C-'" = "flip_selections"
h = "copy_selection_on_next_line"
H = "copy_selection_on_prev_line"
"C-e" = ["move_next_word_end", "collapse_selection", "insert_mode"]
"C-t" = ["insert_at_line_end", "move_char_left"]

[keys.select]
l = "goto_word"
L = "search"
"C-l" = "global_search"
"'" = "collapse_selection"
"C-'" = "flip_selections"
h = "copy_selection_on_next_line"
H = "copy_selection_on_prev_line"
"A-." = "repeat_last_motion"

[keys.normal.space]
l = "global_search"

[keys.normal.'C-j']
l = ":sh kitten @ launch --title Terminal --keep-focus --cwd=current"
r = ":sh kitten @ send-text --match 'title:^Terminal' python3'\r'"
e = ":sh kitten @ send-text --match 'title:^Terminal' --from-file ./temp.py"
